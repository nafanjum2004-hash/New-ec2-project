name: Deploy Project

on:
  workflow_dispatch:
    inputs:
      ami_id:
        description: 'AMI ID'
        required: true

      instance_type:
        description: 'Instance Type'
        required: true

      key_name:
        description: 'Key Pair Name'
        required: true

      aws_region:
        description: 'AWS Region'
        required: true
  
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run a deployment placeholder
        run: echo "Deployment workflow triggered"
      - name: Show Input Values
        run: |
          echo "AMI ID: ${{ github.event.inputs.ami_id }}"
          echo "Instance Type: ${{ github.event.inputs.instance_type }}"
          echo "Key Name: ${{ github.event.inputs.key_name }}"
          echo "AWS Region: ${{ github.event.inputs.aws_region }}"